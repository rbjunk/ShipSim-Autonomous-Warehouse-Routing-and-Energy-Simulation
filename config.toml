# ShipSim Configuration

[sim]
max_ticks = 1000
random_seed = 1 # Remove this line for a non-deterministic run
print_every = 100
output_csv =  "output/metrics.csv"

[world]
width = 20
height = 20
num_robots = 5
num_charging_stations = 2
num_shelf_locations = 30
num_obstacles = 15
# The single drop-off point where robots deliver completed orders
dispatch_x = 10
dispatch_y = 10

[robot]
battery_capacity = 100.0
battery_critical_threshold = 20.0
robot_mass_kg = 50.0
payload_mass_kg = 10.0
efficiency_coefficient = 0.01
charge_rate_per_tick = 10.0

[orders]
arrival_rate_lambda = 0.2  # Average orders generated per tick (Poisson λ)

[debug]
# Master switch — flip to true to enable any debug output.
enabled = true

# Print the ASCII grid every N ticks (0 = never).
# Useful for watching movement in slow motion. Try 100 or 500.
grid_every = 100

# Print the full robot + station status every N ticks (0 = never).
# Try 500 to get periodic snapshots, or set equal to max_ticks for end-of-run only.
status_every = 100

# Automatically dump the grid + status the first time a stuck robot is
# detected (routing state but A* found no path). This is the most useful
# setting for diagnosing freezes — leave it on.
dump_on_stuck = true